<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <div class="card p-5 shadow">

        <h2>💰 Complete Your Payment</h2>

        <h4 class="mt-3">Ride Price: ₹{{ ride.price }}</h4>

        <p>Pickup: {{ ride.pickup }}</p>
        <p>Drop: {{ ride.drop }}</p>

        <hr>

        <!-- UPI Mock Payment -->
        <h5>Pay via UPI</h5>

        <p><b>UPI ID:</b> maan@upi</p>

        <a href="/payment-success/" class="btn btn-success mt-3">
            I Have Paid
        </a>

    </div>

</div>

</body>
</html>
