<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maan Ride Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }
        .card {
            border-radius: 15px;
        }
        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-6">

        <div class="card shadow-lg p-4 bg-white text-dark">

            <h2 class="text-center mb-4">🚗 Maan Ride Booking</h2>

            <!-- ERROR MESSAGE -->
            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <!-- FORM START -->
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pickup Location</label>
                    <input type="text" name="pickup" class="form-control" placeholder="Pickup location" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Drop Location</label>
                    <input type="text" name="drop" class="form-control" placeholder="Drop location" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Time</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    🚀 Book Ride
                </button>
            </form>
            <!-- FORM END -->

        </div>

    </div>
</div>

</body>
</html>
