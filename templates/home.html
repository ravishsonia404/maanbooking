<!DOCTYPE html>
<html>
<head>
    <title>Book Ride</title>
    <meta charset="UTF-8">
</head>

<body style="font-family: Arial; background:#f2f2f2;">

    <div style="width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px;">

        <h2 style="text-align:center;">🚗 Book Your Ride</h2>

        <!-- FORM START -->
        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    style="width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px;">
                Book Ride
            </button>

        </form>
        <!-- FORM END -->

    </div>

</body>
</html>
